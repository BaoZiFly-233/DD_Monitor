name: DDMonitor Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      app_version:
        description: 'Release version used in package name'
        required: true
        default: '3.51'
      release_tag:
        description: 'Git tag for this release'
        required: true
        default: 'v3.51'
      release_name:
        description: 'GitHub Release display name'
        required: true
        default: 'DDMonitor 3.51'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.vars.outputs.app_version }}
      release_tag: ${{ steps.vars.outputs.release_tag }}
      release_name: ${{ steps.vars.outputs.release_name }}
    steps:
      - id: vars
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            APP_VERSION='${{ inputs.app_version }}'
            RELEASE_TAG='${{ inputs.release_tag }}'
            RELEASE_NAME='${{ inputs.release_name }}'
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            APP_VERSION="${RELEASE_TAG#v}"
            RELEASE_NAME="DDMonitor ${APP_VERSION}"
          fi

          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"

  build-windows-x64:
    needs: prepare
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11 x64
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download MPV runtime files
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $release = Invoke-RestMethod -Uri 'https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/latest'
          $runtimeAsset = $release.assets |
            Where-Object { $_.name -match '^mpv-x86_64-.*\.7z$' -and $_.name -notmatch '-v3-' } |
            Select-Object -First 1
          $devAsset = $release.assets |
            Where-Object { $_.name -match '^mpv-dev-x86_64-.*\.7z$' -and $_.name -notmatch '-v3-' } |
            Select-Object -First 1

          if (-not $runtimeAsset) { throw 'mpv runtime asset for x64 was not found' }
          if (-not $devAsset) { throw 'mpv dev asset for x64 was not found' }

          $downloadDir = Join-Path $env:RUNNER_TEMP 'mpv-download'
          $runtimeDir = Join-Path $env:RUNNER_TEMP 'mpv-runtime'
          $devDir = Join-Path $env:RUNNER_TEMP 'mpv-dev'
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null
          New-Item -ItemType Directory -Force -Path $devDir | Out-Null

          $runtimeArchive = Join-Path $downloadDir $runtimeAsset.name
          $devArchive = Join-Path $downloadDir $devAsset.name
          Invoke-WebRequest -Uri $runtimeAsset.browser_download_url -OutFile $runtimeArchive
          Invoke-WebRequest -Uri $devAsset.browser_download_url -OutFile $devArchive

          & 7z x $runtimeArchive "-o$runtimeDir" -y | Out-Host
          & 7z x $devArchive "-o$devDir" -y | Out-Host

          $mpvDll = Join-Path $devDir 'libmpv-2.dll'
          if (-not (Test-Path $mpvDll)) { throw "libmpv-2.dll was not found: $mpvDll" }

          "MPV_DLL=$mpvDll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "MPV_RUNTIME_DIR=$runtimeDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build release package
        shell: cmd
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          MPV_DLL: ${{ env.MPV_DLL }}
          MPV_RUNTIME_DIR: ${{ env.MPV_RUNTIME_DIR }}
        run: scripts\build_win.bat x64

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ddmonitor-windows-x64
          path: release/DDMonitor-${{ needs.prepare.outputs.app_version }}-windows-x64.zip
          if-no-files-found: error

  release:
    needs:
      - prepare
      - build-windows-x64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: ddmonitor-windows-x64
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ needs.prepare.outputs.release_name }}
          generate_release_notes: false
          body_path: docs/release-notes/v3.51.md
          files: release-assets/*.zip
          fail_on_unmatched_files: true
